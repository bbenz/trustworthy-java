# Demo 2 Pipeline — Application Properties

# Azure OpenAI
spring.ai.azure.openai.endpoint=${AZURE_OPENAI_ENDPOINT}
spring.ai.azure.openai.api-key=${AZURE_OPENAI_API_KEY}
spring.ai.azure.openai.chat.options.deployment-name=${AZURE_OPENAI_DEPLOYMENT:gpt-4o}

# Azure AI Content Safety
azure.content-safety.endpoint=${AZURE_CONTENT_SAFETY_ENDPOINT}
azure.content-safety.key=${AZURE_CONTENT_SAFETY_KEY}

# Observability
management.endpoints.web.exposure.include=health,metrics,prometheus
management.metrics.tags.application=trustworthy-ai-demo
management.otlp.metrics.export.enabled=false
spring.ai.chat.observations.include-prompt=true
spring.ai.chat.observations.include-completion=true

# Server
server.port=8080
server.error.include-message=always
server.error.include-stacktrace=always
